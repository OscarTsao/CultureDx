# Ablation: V2 diagnostician + V1 checker + RAG
# Isolates: V2 diagnostician prompt contribution
# prompt_variant=v2diag → diagnostician uses V2, checker stays V1
mode:
  name: hied-v2diag-v1check-rag
  type: hied
  diagnose_then_verify: true
  force_prediction: true
  prompt_variant: v2diag
  scope_policy: manual
  execution_mode: benchmark_manual_scope
  calibrator_mode: heuristic-v2
  target_disorders:
    - F20
    - F31
    - F32
    - F39
    - F41.0
    - F41.1
    - F42
    - F43.1
    - F43.2
    - F45
    - F51
    - F98

llm:
  temperature: 0.0
  max_tokens: 1536

retrieval:
  enabled: true
  top_k: 5
  balanced_per_class: true
  level: 1
