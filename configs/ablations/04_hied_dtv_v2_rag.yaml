# Ablation 4: + RAG (FAISS case retrieval)
# DtV + V2 prompts + label-only similar cases (5 per class, balanced)
mode:
  name: hied-dtv-v2-rag
  type: hied
  diagnose_then_verify: true
  force_prediction: true
  prompt_variant: v2
  scope_policy: manual
  execution_mode: benchmark_manual_scope
  target_disorders:
    - F20
    - F31
    - F32
    - F39
    - F41.0
    - F41.1
    - F42
    - F43.1
    - F43.2
    - F45
    - F51
    - F98

llm:
  temperature: 0.0
  max_tokens: 1536

retrieval:
  enabled: true
  top_k: 5
  balanced_per_class: true
  level: 1
