# vLLM with reasoning parser for Qwen3
# Requires: vllm serve ... --reasoning-parser qwen3
llm:
  provider: vllm
  model_id: "Qwen/Qwen3-32B-AWQ"
  base_url: http://localhost:8000
  temperature: 0.6
  top_k: 20
  max_retries: 3
  max_concurrent: 4
  # Thinking mode: diagnostician gets enable_thinking=true
  # Checker/triage get enable_thinking=false
  # Controlled per-agent in the mode orchestrator
