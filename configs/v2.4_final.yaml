# CultureDx V2.4 Final Configuration
# Paper-aligned DtV (Diagnose-then-Verify) pipeline
#
# Usage: uv run culturedx run -c configs/base.yaml -c configs/v2.4_final.yaml \
#          -d lingxidiag --data-path data/raw/lingxidiag16k
#
# Key design choices:
#   - DtV: diagnostician ranks → checker verifies → logic engine + comorbidity gate
#   - V2 prompts: disorder descriptions, NOS mapping, think-before-answer
#   - RAG Level 1: label-only similar cases (5 per class, balanced)
#   - Forbidden-pairs blacklist (not whitelist) for comorbidity
#   - abs_threshold=0.50, comorbid_min_ratio=0.90 (default, HPO showed +0.002 marginal)
#   - force_prediction=true (no abstention for benchmark)

mode:
  name: hied
  type: hied
  diagnose_then_verify: true
  force_prediction: true
  prompt_variant: v2
  scope_policy: manual
  execution_mode: benchmark_manual_scope
  calibrator_mode: heuristic-v2
  comorbid_min_ratio: 0.90
  target_disorders:
    - F20
    - F31
    - F32
    - F39
    - F41.0
    - F41.1
    - F42
    - F43.1
    - F43.2
    - F45
    - F51
    - F98

llm:
  temperature: 0.0
  max_tokens: 1536

retrieval:
  enabled: true
  top_k: 5
  balanced_per_class: true
  level: 1  # label-only (Level 2 evidence was neutral)
