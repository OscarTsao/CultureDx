evidence:
  enabled: true
  # Scope policy:
  # - auto: manual when target_disorders are set, otherwise all_supported
  # - manual: explicit benchmark/manual disorder list
  # - triage: production/open-set routing derived from upstream triage
  # - all_supported: exhaustive sweep across supported disorders
  scope_policy: auto
  retriever:
    # Available names: mock, lexical, bge-m3, hybrid
    name: bge-m3
    model_id: BAAI/bge-m3
    embedding_dim: 1024
    max_length: 512
    batch_size: 32
    cache_dir: data/cache/retriever
    device: auto
  somatization:
    enabled: true
    llm_fallback: true
  top_k_retrieval: 20
  top_k_final: 10
  min_confidence: 0.1
