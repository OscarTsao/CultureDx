# DtV v2 with selective reasoning mode
# Diagnostician: think=true (benefits from reasoning)
# Checker: think=false (structured output, no benefit)
mode:
  name: hied-dtv-v2-reasoning
  type: hied
  diagnose_then_verify: true
  force_prediction: true
  prompt_variant: v2

# Reasoning config per agent role
reasoning:
  diagnostician_thinking: true
  checker_thinking: false
  triage_thinking: false
