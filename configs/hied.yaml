# HiED mode configuration overlay
# Usage: uv run culturedx run --config configs/base.yaml --config configs/hied.yaml -d mdd5k
mode:
  name: hied
  type: hied
  scope_policy: manual
  execution_mode: benchmark_manual_scope
  target_disorders:
    - F32
    - F33
    - F41.1
    - F42
    - F43.1

evidence:
  scope_policy: manual

llm:
  provider: ollama
  model_id: "qwen3:14b"
  temperature: 0.0
  top_k: 1
