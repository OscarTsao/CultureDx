# R14: Yi-1.5-34B-Chat-AWQ — non-Qwen cross-family bias test
#
# Chose Yi-1.5-34B-Chat-AWQ (01.AI, independent Chinese lab) after verifying:
#   - Truly independent from Qwen family (separate pretrain, separate data)
#   - Native bilingual Chinese/English (3T bilingual corpus)
#   - AWQ INT4 fits RTX 5090 32 GB (~16-17 GB model weights)
#   - Llama architecture but NOT derived from Llama (independent weights)
#
# Alternative: If Yi doesn't work out, second choice is Mistral-Small-24B-Instruct-2501-AWQ
# (European training, different cultural corpus, officially supports Chinese).
#
# vLLM must be running with this model BEFORE executing:
#   vllm serve modelscope/Yi-1.5-34B-Chat-AWQ \
#     --port 8000 \
#     --max-model-len 4096 \
#     --gpu-memory-utilization 0.90 \
#     --quantization awq
#
# Expected interpretation:
#   - If F41/F32 asymmetry 6.4x on Qwen3-32B but <3x on Yi → bias is Qwen-family specific
#   - If asymmetry also ~6x on Yi → bias is general LLM or Chinese-psychiatric-data issue
#
# CRITICAL: Yi uses "tekken"-style tokenizer in some variants. May need:
#   --tokenizer 01-ai/Yi-1.5-34B-Chat if tokenizer_mode defaults fail.

llm:
  provider: vllm
  model_id: modelscope/Yi-1.5-34B-Chat-AWQ
  base_url: http://localhost:8000
  temperature: 0.0
  top_k: 1
  max_retries: 3
  disable_thinking: false  # Yi doesn't have thinking mode; keep false
  max_concurrent: 8        # lower than 32B since we'll use less GPU memory for KV cache
  max_tokens: 1536
