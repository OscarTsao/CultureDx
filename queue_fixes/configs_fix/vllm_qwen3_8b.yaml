# R13: Qwen3-8B-AWQ backbone — tests if F32 bias is 32B-specific
#
# CRITICAL: this overlay MUST come AFTER configs/base.yaml and configs/vllm_awq.yaml
# in the -c list, because it overrides the LLM model only.
#
# vLLM must be running with this model BEFORE executing:
#   vllm serve Qwen/Qwen3-8B-Instruct-AWQ \
#     --port 8000 \
#     --max-model-len 32768 \
#     --gpu-memory-utilization 0.80
#
# Expected behavior change vs Qwen3-32B baseline:
#   - If F32 bias persists → bias is Qwen-family-wide, not 32B-specific
#   - If F32 bias reduces → some portion of bias is model-size/capacity dependent
#
# Field names match LLMConfig (src/culturedx/core/config.py): provider, model_id, base_url
# DO NOT use `backend:` or `model:` — those are silently dropped by Pydantic (extra="ignore").

llm:
  provider: vllm
  model_id: Qwen/Qwen3-8B-Instruct-AWQ
  base_url: http://localhost:8000
  temperature: 0.0
  top_k: 1
  max_retries: 3
  disable_thinking: true
  max_concurrent: 16
  max_tokens: 1536
