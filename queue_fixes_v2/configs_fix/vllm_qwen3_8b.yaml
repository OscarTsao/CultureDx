# R13: Qwen3-8B-AWQ backbone — tests if F32 bias is 32B-specific
#
# CORRECTED (prior version had typo 'Qwen3-8B-Instruct-AWQ' — no such repo exists).
# Qwen3 series does NOT have a separate "-Instruct" variant; the base Qwen3-8B
# already is the Instruct-tuned model.
#
# vLLM must be running with this model BEFORE executing:
#   pkill -f vllm
#   vllm serve Qwen/Qwen3-8B-AWQ \
#     --port 8000 \
#     --max-model-len 32768 \
#     --gpu-memory-utilization 0.80 \
#     --enable-reasoning --reasoning-parser deepseek_r1
#   # (wait ~60-90 seconds for model load)
#   # Verify with:
#   curl http://localhost:8000/v1/models
#
# Per Qwen docs: Qwen3-8B-AWQ should be served with --enable-reasoning and
# --reasoning-parser deepseek_r1 so the <think>...</think> block is parsed correctly.
# Our client config sets disable_thinking=true which passes
# chat_template_kwargs={"enable_thinking": false} to skip thinking mode at inference time.
#
# Field names match LLMConfig (src/culturedx/core/config.py): provider, model_id, base_url
# DO NOT use `backend:` or `model:` — those would be caught by strict validation now,
# but older configs might still be in the repo.

llm:
  provider: vllm
  model_id: Qwen/Qwen3-8B-AWQ
  base_url: http://localhost:8000
  temperature: 0.0
  top_k: 1
  max_retries: 3
  disable_thinking: true
  max_concurrent: 16
  max_tokens: 1536
